<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <clipPath id="rounded">
      <rect width="192" height="192" rx="42" ry="42"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="42" ry="42" fill="#0D0F14"/>

  <!-- Outer ring track -->
  <circle cx="96" cy="88" r="58" fill="none" stroke="#1E2128" stroke-width="6"/>

  <!-- Progress arc (~75% = 270deg) -->
  <circle cx="96" cy="88" r="58"
    fill="none"
    stroke="#00D4CC"
    stroke-width="6"
    stroke-linecap="round"
    stroke-dasharray="274 91"
    stroke-dashoffset="91"
    transform="rotate(-90 96 88)"/>

  <!-- Dot at end of arc -->
  <circle cx="96" cy="30" r="4" fill="#00D4CC" transform="rotate(260 96 88)"/>

  <!-- 100 text -->
  <text x="96" y="82" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="36"
    font-weight="700"
    fill="#FFFFFF"
    letter-spacing="-2">100</text>

  <!-- min text -->
  <text x="96" y="100" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="14"
    font-weight="400"
    fill="#00D4CC"
    letter-spacing="3">min</text>

  <!-- Bottom label -->
  <rect x="52" y="154" width="88" height="20" rx="6" fill="#131620"/>
  <text x="96" y="168" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11"
    font-weight="500"
    fill="#888888"
    letter-spacing="1">SPRINT</text>
</svg>
